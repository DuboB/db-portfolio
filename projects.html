  <style>
    .nav-logo { font-family:'Assistant',sans-serif; font-weight:700; font-size:1.6rem; letter-spacing:0.04em; color:var(--black); text-decoration:none !important; display:flex; align-items:baseline; gap:0.2rem; transition:color 0.3s; }
    .nav-logo-sub { font-weight:300; font-size:0.7rem; letter-spacing:0.12em; color:rgba(18,18,18,0.5); text-decoration:none !important; }
    nav.hero-nav .nav-logo, nav.hero-nav .nav-links a, nav.hero-nav .nav-right a { color:var(--white); }
    nav.hero-nav .nav-logo-sub { color:rgba(255,255,255,0.5); }
    nav.hero-nav .burger span { background:var(--white); }

    /* ── VIDEO HERO ── */
    .video-hero { position:relative; width:100%; height:100vh; overflow:hidden; background:#111; }
    .video-hero video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 0.6s ease; }
    .video-hero video.active { opacity:1; }
    .video-hero-text { position:absolute; bottom:5vh; left:2.5vw; z-index:10; pointer-events:none; }
    .video-hero-text .hero-logo { display:block; font-family:'Assistant',sans-serif; font-weight:700; font-size:clamp(3.5rem,8vw,7rem); letter-spacing:-0.05em; color:var(--white); line-height:1; }
    .video-hero-text h1 { font-family:'Assistant',sans-serif; font-weight:600; font-size:clamp(0.65rem,1.2vw,0.85rem); letter-spacing:0.25em; line-height:1.4; color:rgba(255,255,255,0.8); margin-top:0.5rem; }

    /* ── VIDEO GRID ── */
    .projects-section { padding:6px 0 0; }
    .projects-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
    .projects-item { overflow:hidden; cursor:pointer; position:relative; aspect-ratio:16/9; background:#111; }
    .projects-item video { width:100%; height:100%; object-fit:cover; display:block; filter:brightness(0.88); transition:transform 0.7s ease, filter 0.5s ease; }
    .projects-item:hover video { transform:scale(1.04); filter:brightness(1); }
    @media (max-width:760px) { .projects-grid { grid-template-columns:1fr 1fr; } }
    @media (max-width:480px) { .projects-grid { grid-template-columns:1fr; } }
  </style>

  <script>
    /* ── VIDEO HERO CYCLING ── */
    const vhVideos = Array.from(document.querySelectorAll('.video-hero video'));
    let vhIdx = 0;
    vhVideos[0].classList.add('active');
    vhVideos[0].play();
    vhVideos[0].addEventListener('ended', cycleHero);
    function cycleHero() {
      vhVideos[vhIdx].classList.remove('active');
      vhIdx = (vhIdx + 1) % vhVideos.length;
      const next = vhVideos[vhIdx];
      next.currentTime = 0;
      next.play();
      next.classList.add('active');
      next.addEventListener('ended', cycleHero, { once: true });
    }

    /* ── NAV SCROLL ── */
    const videoHero = document.getElementById('video-hero');
    window.addEventListener('scroll', () => {
      const n = document.getElementById('main-nav');
      n.classList.toggle('hero-nav', videoHero.getBoundingClientRect().bottom > 80);
    });
  </script>
