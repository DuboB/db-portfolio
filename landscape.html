  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="stylesheet" href="style.css?v=4" />
  <style>
    .nav-logo {
      font-family: 'Assistant', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: 0.04em;
      color: var(--black);
      text-decoration: none !important;
      display: flex;
      align-items: baseline;
      gap: 0.2rem;
      transition: color 0.3s;
    }
    .nav-logo-sub {
      font-weight: 300;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: rgba(18,18,18,0.5);
      text-decoration: none !important;
    }
    nav.hero-nav .nav-logo,
    nav.hero-nav .nav-links a,
    nav.hero-nav .nav-right a { color: var(--white); }
    nav.hero-nav .nav-logo-sub { color: rgba(255,255,255,0.5); }
    nav.hero-nav .burger span { background: var(--white); }

    /* ── SLIDESHOW HERO ── */
    .slide-hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #111;
    }
    .slide-hero .foto-slide {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0; z-index: 1;
    }
    .slide-hero .foto-slide.active { opacity: 1; z-index: 2; }
    #sh-flash {
      position: absolute; inset: 0; z-index: 5;
      background: #fff; opacity: 0; pointer-events: none;
    }
    .slide-hero-text {
      position: absolute;
      bottom: 5vh; left: 2.5vw;
      z-index: 10;
      pointer-events: none;
    }
    .slide-hero-text .hero-logo {
      display: block;
      font-family: 'Assistant', sans-serif;
      font-weight: 700;
      font-size: clamp(3.5rem, 8vw, 7rem);
      letter-spacing: -0.05em;
      color: var(--white);
      line-height: 1;
    }
    .slide-hero-text h1 {
      font-family: 'Assistant', sans-serif;
      font-weight: 600;
      font-size: clamp(0.65rem, 1.2vw, 0.85rem);
      letter-spacing: 0.25em;
      line-height: 1.4;
      color: rgba(255,255,255,0.8);
      margin-top: 0.5rem;
    }

    /* ── MASONRY GRID ── */
    .ls-section { padding: 6px 0 0; }
    .ls-grid {
      columns: 3;
      column-gap: 6px;
    }
    .ls-item {
      break-inside: avoid;
      margin-bottom: 6px;
      overflow: hidden;
      cursor: zoom-in;
    }
    .ls-item img {
      width: 100%;
      height: auto;
      display: block;
      filter: brightness(0.92);
      transition: transform 0.7s ease, filter 0.5s ease;
    }
    .ls-item:hover img {
      transform: scale(1.04);
      filter: brightness(1);
    }
    @media (max-width: 760px) {
      .ls-grid { columns: 2; }
    }
  </style>
</head>

    /* ── SLIDESHOW ── */
    const shA = document.getElementById('sh-a');
    const shB = document.getElementById('sh-b');
    const shFlash = document.getElementById('sh-flash');
    let shAktiv = shA, shNaechst = shB, shIdx = 0;

    function shShow(src) {
      shNaechst.style.backgroundImage = `url('img/landscape/${encodeURIComponent(src)}')`;
      shFlash.style.transition = 'none';
      shFlash.style.opacity = '1';
      shAktiv.classList.remove('active');
      shNaechst.classList.add('active');
      [shAktiv, shNaechst] = [shNaechst, shAktiv];
      requestAnimationFrame(() => requestAnimationFrame(() => {
        shFlash.style.transition = 'opacity 0.25s ease';
        shFlash.style.opacity = '0';
      }));
    }
    shShow(lsFiles[0]);
    setInterval(() => { shIdx = (shIdx + 1) % lsFiles.length; shShow(lsFiles[shIdx]); }, 1000);

    /* ── PHOTO GRID ── */
    const grid = document.getElementById('ls-grid');
    lsFiles.forEach((f, i) => {
      const div = document.createElement('div');
      div.className = 'ls-item' + (i % 7 === 3 ? ' tall' : '');
      const img = document.createElement('img');
      img.src = `img/landscape/${encodeURIComponent(f)}`;
      img.alt = 'Landscape';
      img.loading = 'lazy';
      div.appendChild(img);
      div.addEventListener('click', () => openLightbox(`img/landscape/${encodeURIComponent(f)}`));
      grid.appendChild(div);
    });

    /* ── NAV SCROLL ── */
    const slideHero = document.getElementById('slide-hero');
    window.addEventListener('scroll', () => {
      const n = document.getElementById('main-nav');
      n.classList.toggle('hero-nav', slideHero.getBoundingClientRect().bottom > 80);
    });
  </script>
